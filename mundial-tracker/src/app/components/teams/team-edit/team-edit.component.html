<div class="page">
  <div class="breadcrumb">
    <a [routerLink]="['/teams', teamId]">← Equipo</a>
  </div>

  <h1>Editar Equipo</h1>

  @if (error) {
    <div class="alert-error">{{ error }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="updateTeam()" class="form-card">
    <div class="form-group">
      <label for="name">Nombre del equipo *</label>
      <input id="name" formControlName="name" type="text" placeholder="Ej: Argentina" />
      @if (form.get('name')?.invalid && form.get('name')?.touched) {
        <span class="field-error">El nombre es obligatorio (mínimo 2 caracteres).</span>
      }
    </div>

    <div class="form-group">
      <label for="code">Código (2-3 letras) *</label>
      <input id="code" formControlName="code" type="text" placeholder="Ej: ARG" maxlength="3" />
      @if (form.get('code')?.invalid && form.get('code')?.touched) {
        <span class="field-error">Código de 2 a 3 letras.</span>
      }
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="group">Grupo *</label>
        <select id="group" formControlName="group">
          @for (g of groups; track g) {
            <option [value]="g">Grupo {{ g }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="confederation">Confederación *</label>
        <select id="confederation" formControlName="confederation">
          @for (c of confederations; track c) {
            <option [value]="c">{{ c }}</option>
          }
        </select>
      </div>
    </div>

    <div class="form-actions">
      <a [routerLink]="['/teams', teamId]" class="btn-cancel">Cancelar</a>
      <button type="submit" class="btn-submit" [disabled]="form.invalid || loading">
        {{ loading ? 'Guardando...' : 'Actualizar Equipo' }}
      </button>
    </div>
  </form>
</div>
