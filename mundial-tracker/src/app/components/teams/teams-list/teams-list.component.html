<div class="page">
  <div class="page-header">
    <h1>Equipos</h1>
    <a routerLink="/teams/new" class="btn-add">+ Nuevo Equipo</a>
  </div>

  <div class="filters">
    <input
      type="text"
      placeholder="Buscar equipo..."
      (input)="onSearch($event)"
      class="filter-input"
    />
    <select (change)="onGroupChange($event)" class="filter-select">
      <option value="all">Todos los grupos</option>
      @for (g of groups; track g) {
        <option [value]="g">Grupo {{ g }}</option>
      }
    </select>
  </div>

  <div class="table-wrapper">
    <table class="data-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Código</th>
          <th>Grupo</th>
          <th>Confederación</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (team of filtered; track team.id) {
          <tr>
            <td>{{ team.name }}</td>
            <td><span class="code-badge">{{ team.code }}</span></td>
            <td><span class="group-badge">{{ team.group }}</span></td>
            <td>{{ team.confederation }}</td>
            <td class="actions">
              <a [routerLink]="['/teams', team.id]" class="btn-icon view" title="Ver">👁</a>
              <a [routerLink]="['/teams/edit', team.id]" class="btn-icon edit" title="Editar">✏️</a>
              <button (click)="deleteTeam(team.id)" class="btn-icon delete" title="Eliminar">🗑</button>
            </td>
          </tr>
        } @empty {
          <tr><td colspan="5" class="empty">No se encontraron equipos.</td></tr>
        }
      </tbody>
    </table>
  </div>
</div>
