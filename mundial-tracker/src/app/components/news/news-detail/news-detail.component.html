@if (item) {
  <div class="page">
    <div class="breadcrumb">
      <a routerLink="/news">← Noticias</a>
    </div>

    <span class="category">{{ item.category }}</span>
    <h1>{{ item.title }}</h1>
    <div class="meta">
      <span>{{ item.date }}</span>
      <span>{{ item.author }}</span>
    </div>

    <p class="content">{{ item.content }}</p>
  </div>
} @else {
  <div class="loading">Cargando noticia...</div>
}
